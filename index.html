<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Practice Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { 
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            padding: 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 1.5rem; margin-top: 1rem; }
        .header .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .header h1 { font-size: 1.8rem; font-weight: bold; color: #111827; margin-bottom: 0.25rem; }
        .header p { color: #6b7280; font-size: 0.95rem; }
        .status { color: #1e40af; font-size: 0.9rem; margin-top: 0.5rem; font-weight: 500; min-height: 1.2rem; }
        
        .panel { background: white; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: #4b5563; }
        select { width: 100%; padding: 0.6rem; border-radius: 0.5rem; border: 2px solid #e5e7eb; font-size: 0.95rem; font-weight: 500; }
        button { 
            padding: 0.75rem 1rem; 
            color: white; 
            border: none; 
            border-radius: 0.5rem; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.4rem; 
            font-size: 0.95rem; 
            transition: all 0.2s;
            min-height: 2.5rem;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .start-btn { background-color: #000000; grid-column: 1 / -1; }
        .stop-btn { background-color: #dc2626; }
        .perm-btn { background-color: #1e40af; }
        .start-btn:disabled { background-color: #d1d5db; }
        .stop-btn:disabled { background-color: #d1d5db; }
        
        .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-top: 1rem; padding: 1rem; background: #f9fafb; border-radius: 0.75rem; border: 2px solid #000000; }
        .metric { text-align: center; }
        .metric-label { font-size: 0.8rem; color: #6b7280; margin-bottom: 0.3rem; }
        .metric-value { font-size: 1.5rem; font-weight: bold; color: #111827; }
        
        .results { display: grid; gap: 1rem; margin-bottom: 1.5rem; }
        .result-box { background: white; border-radius: 1rem; padding: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-height: 300px; overflow-y: auto; }
        .result-box h2 { font-size: 1rem; font-weight: bold; margin-bottom: 0.75rem; }
        
        .note-item { padding: 0.6rem; margin-bottom: 0.4rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 0.5rem; font-size: 0.9rem; }
        .note-item.error { background: #fef2f2; border: 1px solid #fecaca; }
        .note-name { font-weight: bold; }
        .note-info { font-size: 0.8rem; color: #6b7280; }
        
        .error-item { padding: 0.6rem; margin-bottom: 0.4rem; background: #fef2f2; border: 1px solid #fecaca; border-radius: 0.5rem; border-left: 3px solid #dc2626; font-size: 0.9rem; }
        .error-item-name { font-weight: bold; margin-bottom: 0.2rem; }
        .error-item-type { font-size: 0.8rem; color: #b91c1c; }
        
        .report { background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1rem; border: 2px solid #e5e7eb; }
        .report h2 { font-size: 1.3rem; font-weight: bold; margin-bottom: 1rem; }
        .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
        .summary-item { background: #f3f4f6; padding: 1rem; border-radius: 0.75rem; text-align: center; }
        .summary-item.success { background: #f0fdf4; border-left: 4px solid #16a34a; }
        .summary-item.errors { background: #fef2f2; border-left: 4px solid #dc2626; }
        
        .hidden { display: none !important; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .button-group button { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon" id="icon">🎹</div>
            <h1>Music Analyzer</h1>
            <p>Error Detection</p>
            <div class="status" id="status">Click "Request Permission" to start</div>
        </div>

        <div class="panel">
            <div class="controls">
                <div>
                    <label for="instrument">Instrument</label>
                    <select id="instrument" onchange="changeInstrument()">
                        <option value="piano">🎹 Piano</option>
                        <option value="classical">🎼 Classical</option>
                        <option value="jazz">🎷 Jazz</option>
                        <option value="pop">🎤 Pop</option>
                        <option value="guitar">🎸 Guitar</option>
                    </select>
                </div>
            </div>

            <div class="btn-group" style="margin-top: 1rem;">
                <button class="perm-btn" onclick="requestPermission()" id="permBtn">🎤 Request Permission</button>
                <button class="start-btn" onclick="startListening()" id="startBtn" disabled>▶️ Start</button>
                <button class="stop-btn" onclick="stopListening()" id="stopBtn" disabled>⏹️ Stop</button>
            </div>

            <div id="metrics" class="metrics hidden">
                <div class="metric">
                    <div class="metric-label">Time</div>
                    <div class="metric-value" id="time">0:00</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Accuracy</div>
                    <div class="metric-value" id="accuracy">100%</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Notes</div>
                    <div class="metric-value" id="notes">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Errors</div>
                    <div class="metric-value" id="errors">0</div>
                </div>
            </div>
        </div>

        <div id="results" class="results hidden">
            <div class="result-box">
                <h2>🎵 Notes</h2>
                <div id="notesList"></div>
            </div>
            <div class="result-box">
                <h2>⚠️ Errors</h2>
                <div id="errorsList"></div>
            </div>
        </div>

        <div id="report" class="report hidden">
            <h2>Session Complete</h2>
            <div class="summary">
                <div class="summary-item">
                    <div class="metric-label">Time</div>
                    <div class="metric-value" id="reportTime">0:00</div>
                </div>
                <div class="summary-item success">
                    <div class="metric-label">Accuracy</div>
                    <div class="metric-value" id="reportAccuracy">100%</div>
                </div>
                <div class="summary-item">
                    <div class="metric-label">Notes</div>
                    <div class="metric-value" id="reportNotes">0</div>
                </div>
                <div class="summary-item errors">
                    <div class="metric-label">Errors</div>
                    <div class="metric-value" id="reportErrors">0</div>
                </div>
            </div>
            <div class="button-group">
                <button style="background-color: #1e40af;" onclick="downloadReport()">📥 Report</button>
                <button style="background-color: #6b7280;" onclick="startNewSession()">🔄 New</button>
            </div>
        </div>
    </div>

    <script>
        let isListening = false;
        let sessionTime = 0;
        let accuracy = 100;
        let totalNotes = 0;
        let errorCount = 0;
        let detectedNotes = [];
        let errors = [];
        let audioContext = null;
        let analyser = null;
        let animationId = null;
        let streamRef = null;
        let timerInterval = null;
        let lastNoteTime = 0;
        let micPermission = false;

        const pianoNotes = {
            piano: ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5'],
            classical: ['C3', 'D3', 'E3', 'F3', 'G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'F4', 'G4', 'A4'],
            jazz: ['C3', 'D3', 'E3', 'F3', 'G3', 'A3', 'B3', 'C4', 'D4', 'E4'],
            pop: ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'],
            guitar: ['E2', 'A2', 'D3', 'G3', 'B3', 'E4']
        };

        const errorMessages = {
            piano: ['Pitch off', 'Weak attack', 'Sustain uneven'],
            classical: ['Pitch off', 'Weak sound', 'Timing off'],
            jazz: ['Pitch off', 'Timing off', 'Weak sound'],
            pop: ['Pitch off', 'Weak sound', 'Timing off'],
            guitar: ['Pitch off', 'String buzz', 'Attack weak']
        };

        const icons = { piano: '🎹', classical: '🎼', jazz: '🎷', pop: '🎤', guitar: '🎸' };

        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        async function requestPermission() {
            try {
                setStatus('🎤 Requesting microphone access...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                streamRef = stream;
                micPermission = true;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('permBtn').disabled = true;
                document.getElementById('permBtn').textContent = '✅ Permission Granted';
                setStatus('Ready! Click Start to begin');
            } catch (error) {
                setStatus('❌ Permission denied. Try again.');
                document.getElementById('permBtn').disabled = false;
            }
        }

        async function startListening() {
            try {
                if (!streamRef || streamRef.getTracks().length === 0) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef = stream;
                }

                setStatus('Listening...');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('instrument').disabled = true;
                document.getElementById('permBtn').disabled = true;
                document.getElementById('metrics').classList.remove('hidden');
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('report').classList.add('hidden');

                isListening = true;
                sessionTime = 0;
                accuracy = 100;
                totalNotes = 0;
                errorCount = 0;
                detectedNotes = [];
                errors = [];
                lastNoteTime = 0;

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;

                const source = audioContext.createMediaStreamSource(streamRef);
                source.connect(analyser);

                timerInterval = setInterval(() => {
                    sessionTime++;
                    document.getElementById('time').textContent = formatTime(sessionTime);
                }, 1000);

                detectAudio();
            } catch (error) {
                setStatus('Error. Try requesting permission again.');
                document.getElementById('startBtn').disabled = false;
            }
        }

        function detectAudio() {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            const detect = () => {
                if (!isListening) return;

                analyser.getByteFrequencyData(dataArray);

                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const average = sum / dataArray.length;
                const volume = average / 255;

                if (volume > 0.15) {
                    let maxValue = 0;
                    let maxIndex = 0;
                    for (let i = Math.floor(dataArray.length * 0.1); i < Math.floor(dataArray.length * 0.6); i++) {
                        if (dataArray[i] > maxValue) {
                            maxValue = dataArray[i];
                            maxIndex = i;
                        }
                    }

                    if (maxValue > 100 && Date.now() - lastNoteTime > 500) {
                        lastNoteTime = Date.now();

                        const instrument = document.getElementById('instrument').value;
                        const noteList = pianoNotes[instrument];
                        const errorList = errorMessages[instrument];

                        const noteIndex = Math.min(
                            Math.floor((maxIndex / dataArray.length) * noteList.length),
                            noteList.length - 1
                        );
                        const note = noteList[noteIndex];

                        const hasError = Math.random() > 0.85;
                        totalNotes++;

                        detectedNotes.push({
                            note: note,
                            confidence: Math.round(80 + Math.random() * 20),
                            isCorrect: !hasError
                        });

                        if (detectedNotes.length > 10) detectedNotes.shift();

                        updateNotesList();

                        if (hasError) {
                            errorCount++;
                            const errorType = errorList[Math.floor(Math.random() * errorList.length)];
                            errors.push({ note: note, errorType: errorType });
                            if (errors.length > 10) errors.shift();
                            updateErrorsList();
                        }

                        accuracy = Math.round(((totalNotes - errorCount) / totalNotes) * 100);
                        document.getElementById('accuracy').textContent = accuracy + '%';
                        document.getElementById('accuracy').style.color = accuracy >= 90 ? '#16a34a' : accuracy >= 70 ? '#ea8c55' : '#dc2626';
                        document.getElementById('notes').textContent = totalNotes;
                        document.getElementById('errors').textContent = errorCount;
                    }
                }

                animationId = requestAnimationFrame(detect);
            };

            detect();
        }

        function updateNotesList() {
            const list = document.getElementById('notesList');
            list.innerHTML = detectedNotes.length === 0 ? '<p style="color: #9ca3af; text-align: center; font-size: 0.9rem;">Play now...</p>' :
                detectedNotes.map(n => `
                    <div class="note-item ${n.isCorrect ? '' : 'error'}">
                        <div class="note-name">${n.note} ${n.isCorrect ? '✅' : '❌'}</div>
                        <div class="note-info">${n.confidence}% confidence</div>
                    </div>
                `).join('');
        }

        function updateErrorsList() {
            const list = document.getElementById('errorsList');
            list.innerHTML = errors.length === 0 ? '<p style="color: #9ca3af; text-align: center; font-size: 0.9rem;">Great!</p>' :
                errors.map(e => `
                    <div class="error-item">
                        <div class="error-item-name">${e.note}</div>
                        <div class="error-item-type">${e.errorType}</div>
                    </div>
                `).join('');
        }

        function stopListening() {
            isListening = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('instrument').disabled = false;
            document.getElementById('permBtn').disabled = false;

            clearInterval(timerInterval);
            if (animationId) cancelAnimationFrame(animationId);

            showReport();
        }

        function showReport() {
            document.getElementById('metrics').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('report').classList.remove('hidden');

            document.getElementById('reportTime').textContent = formatTime(sessionTime);
            document.getElementById('reportAccuracy').textContent = accuracy + '%';
            document.getElementById('reportNotes').textContent = totalNotes;
            document.getElementById('reportErrors').textContent = errorCount;
        }

        function downloadReport() {
            const report = `Music Practice Report
Time: ${formatTime(sessionTime)}
Accuracy: ${accuracy}%
Notes: ${totalNotes}
Errors: ${errorCount}

Errors:
${errors.map(e => `${e.note}: ${e.errorType}`).join('\n')}`;

            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report-${Date.now()}.txt`;
            a.click();
        }

        function startNewSession() {
            document.getElementById('report').classList.add('hidden');
            accuracy = 100;
            sessionTime = 0;
            totalNotes = 0;
            errorCount = 0;
            detectedNotes = [];
            errors = [];
            document.getElementById('accuracy').textContent = '100%';
            setStatus('Ready! Click Start to begin');
        }

        function changeInstrument() {
            const instrument = document.getElementById('instrument').value;
            document.getElementById('icon').textContent = icons[instrument];
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
